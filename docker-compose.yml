services:
  soundrealty-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soundrealty-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - MODEL_NAME=added_features
    volumes:
      - ./model:/app/model:ro
      - ./data:/app/data:ro
      - ./src:/app/src:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - soundrealty-network

networks:
  soundrealty-network:
    driver: bridge
