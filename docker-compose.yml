services:
  soundrealty-api-basic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soundrealty-api-basic
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - MODEL_NAME=basic
    volumes:
      - ./model:/app/model:ro
      - ./data:/app/data:ro
      - ./src:/app/src:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - soundrealty-network
    expose:
      - "8000"

  soundrealty-api-added-features:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soundrealty-api-added-features
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - MODEL_NAME=added_features
    volumes:
      - ./model:/app/model:ro
      - ./data:/app/data:ro
      - ./src:/app/src:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - soundrealty-network
    expose:
      - "8000"

  nginx-proxy:
    image: nginx:alpine
    container_name: soundrealty-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - soundrealty-api-basic
      - soundrealty-api-added-features
    restart: unless-stopped
    networks:
      - soundrealty-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  soundrealty-network:
    driver: bridge
